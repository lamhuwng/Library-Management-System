<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thư viện - LibManage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo"><h2>Thư viện sách</h2></div>
            <nav class="menu">
                <ul>
                    <li><a href="#" id="nav-home" class="active">Trang chủ (Mượn)</a></li>
                    <li><a href="#" id="nav-return">Quản lý trả sách</a></li>
                </ul>
            </nav>
            <div class="user-info">
                <p>Thủ thư: <strong>****</strong></p>
                <a href="login.html" class="logout-btn">Đăng xuất</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- PHẦN 1: GIAO DIỆN MƯỢN SÁCH (Mặc định hiện) -->
            <div id="home-section">
                <header class="top-bar">
                    <div class="search-container">
                        <div class="search-wrapper">
                            <input type="text" id="library-search" placeholder="Tìm tên sách, tác giả..." onkeyup="liveSearch()">
                            <button class="search-btn">Tìm kiếm</button>
                        </div>
                    </div>
                </header>
                <section class="content-body">
                    <div class="section-header"><h2>Danh mục sách</h2></div>
                    <div id="product-list" class="book-grid"></div>
                </section>
            </div>

            <!-- PHẦN 2: GIAO DIỆN TRẢ SÁCH (Mặc định ẩn) -->
            <div id="return-section" style="display: none; padding: 20px;">
                <div class="section-header"><h2>Danh sách đang mượn (Toàn thư viện)</h2></div>
                <div class="search-bar" style="margin-bottom: 20px;">
                    <input type="text" id="return-search" placeholder="Tìm theo tên độc giả, mã sách..." 
                           onkeyup="filterReturnList()" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Mã Độc Giả</th>
                                <th>Tên Độc Giả</th>
                                <th>Tên Sách</th>
                                <th>Hạn Trả</th>
                                <th style="text-align: center;">Ngày Mượn</th> <!-- Giữ center nếu muốn -->
                                <th>Hành Động</th>
                            </tr>
                        </thead>
                        <tbody id="master-return-list">
                            <!-- JS render data vào đây -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Right Panel (Giỏ mượn - Chỉ hiện ở trang chủ) -->
        <aside class="borrow-cart" id="right-panel">
            <h2>Sách chờ mượn</h2>
            <div class="reader-selection">
                <label for="reader-id-input">Mã độc giả:</label>
                <input type="text" id="reader-id-input" placeholder="Nhập mã độc giả...">
            </div>
            <div id="cart-items" class="cart-list">
                <p class="empty-msg">Chưa chọn sách nào.</p>
            </div>
            <div class="cart-summary">
                <div class="summary-item">
                    <span>Số lượng:</span>
                    <span id="subtotal">0 cuốn</span>
                </div>
                <button id="checkout-btn" class="action-btn" disabled>Xác nhận mượn</button>
            </div>
        </aside>
    </div>

    <script src="./JavaScripts/index.js"></script>
</body>
</html>
