<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Thư viện - LibManage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo"><h2>Thư viện sách</h2></div>
            <nav class="menu">
                <ul><li><a href="index.html" class="active">Trang chủ</a></li></ul>
            </nav>
            <div class="user-info">
                <p>Thủ thư: <strong>****</strong></p>
                <a href="login.html" class="logout-btn">Đăng xuất</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-container">
                    <div class="search-wrapper">
                        <i class="search-icon">Tìm kiếm sách</i>
                        <!-- Sự kiện liveSearch() phải có trong index.js -->
                        <input type="text" id="library-search" placeholder="Tìm tên sách, tác giả..." onkeyup="liveSearch()">
                        <button class="search-btn">Tìm kiếm</button>
                    </div>
                </div>
            </header>

            <section class="content-body">
                <div class="section-header"><h2>Danh mục sách</h2></div>
                <div id="product-list" class="book-grid"></div>
            </section>
        </main>

        <!-- Right Panel (Giỏ mượn) -->
        <aside class="borrow-cart">
            <h2>Sách chờ mượn</h2>
            <div id="cart-items" class="cart-list">
                <p class="empty-msg">Chưa chọn sách nào.</p>
            </div>
            <div class="cart-summary">
                <div class="summary-item">
                    <span>Số lượng:</span>
                    <span id="subtotal">0 cuốn</span>
                </div>
                <button id="checkout-btn" class="action-btn" disabled>Xác nhận mượn</button>
            </div>
        </aside>
    </div>
    <script src="./JavaScripts/index.js"></script>
</body>
</html>
