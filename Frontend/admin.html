<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản trị hệ thống</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JavaScripts/admin-js.js"></script>
</head>
<body>
    <div class="admin-container">
        <h2>Hệ thống Quản lý Sách</h2>
        <div class="input-group">
            <input type="text" placeholder="Tên sách...">
            <input type="text" placeholder="Tác giả...">
            <button class="add-btn">+ Thêm mới</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Tên Sách</th>
                    <th>Tác Giả</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
            </thead>
        </table>

</body>
</html>
